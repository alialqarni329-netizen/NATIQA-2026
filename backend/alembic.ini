# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

sys.path = .
# timezone = Asia/Riyadh
# URL is overridden in env.py via DATABASE_URL environment variable
sqlalchemy.url = postgresql+asyncpg://natiqa_admin:NatiqaDb2026@localhost:5432/natiqa

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
