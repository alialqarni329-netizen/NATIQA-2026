# ═══════════════════════════════════════════════════════════════
#  NATIQA Platform — docker-compose.yml
#
#  الـ context لكل service هو المجلد الذي يحتوي Dockerfile:
#    backend  → ./backend   (يقرأ ./backend/Dockerfile)
#    frontend → ./frontend  (يقرأ ./frontend/Dockerfile)
# ═══════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: natiqa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-natiqa}
      POSTGRES_USER: ${POSTGRES_USER:-natiqa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NatiqaDb2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - natiqa_internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-natiqa_admin} -d ${POSTGRES_DB:-natiqa}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: natiqa_redis
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - natiqa_internal
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (Local LLM — optional) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: natiqa_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - natiqa_internal
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    # GPU support — uncomment if available:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # ─── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend # ← مجلد backend/
      dockerfile: Dockerfile # ← backend/Dockerfile
    container_name: natiqa_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-natiqa_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-natiqa}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      OLLAMA_URL: "http://ollama:11434"
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # ── LLM Provider (Adapter Pattern) ──────────────────────
      # claude = Anthropic Claude API (مع Data Masking تلقائي)
      # ollama = Local LLM           (بدون Masking — محلي 100%)
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@natiqa.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-Admin@2025!}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-مدير النظام}
    volumes:
      - uploads_data:/app/uploads
      - vector_data:/app/vectors
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - natiqa_internal
      - natiqa_web
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend # ← مجلد frontend/
      dockerfile: Dockerfile # ← frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: natiqa_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    networks:
      - natiqa_web

  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: natiqa_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - natiqa_web

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  uploads_data:
  vector_data:


networks:
  natiqa_internal:
    driver: bridge
    internal: true # لا يصل للإنترنت مباشرة
  natiqa_web:
    driver: bridge
