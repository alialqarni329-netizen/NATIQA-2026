name: NATIQA CI — Backend Tests + Frontend Build

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: Lint + Tests
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Python Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: natiqa_test
          POSTGRES_USER: natiqa_test
          POSTGRES_PASSWORD: test_password_ci
        options: >-
          --health-cmd "pg_isready -U natiqa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: "postgresql+asyncpg://natiqa_test:test_password_ci@127.0.0.1:5432/natiqa_test"
      REDIS_URL: "redis://127.0.0.1:6379/0"
      SECRET_KEY: "ci-test-secret-key-not-for-production-use-32chars"
      ENCRYPTION_KEY: "ci-test-encryption-key-not-for-production"
      LLM_PROVIDER: "ollama"
      OLLAMA_URL: "http://localhost:11434"
      ENVIRONMENT: "testing"
      DEBUG: "true"
      CLAUDE_API_KEY: ""
      RESEND_API_KEY: ""
      ENABLE_REAL_EMAIL: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx anyio aiosqlite greenlet

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=30
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─────────────────────────────────────────────────────────────
  # Frontend: Type Check + Build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api"

      - name: Next.js build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
          NODE_ENV: production

  # ─────────────────────────────────────────────────────────────
  # Security: Secret Scanning
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security — Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Check for hardcoded credentials
        run: |
          echo "Checking for hardcoded secrets..."
          # منع أي passwords حقيقية في الكود
          if grep -r "password\s*=\s*['\"][^'\"]\{8,\}['\"]" --include="*.py" backend/app/ | grep -v "test\|mock\|example\|CHANGE_ME\|hash_password\|verify_password\|new_password\|hashed_password\|body\.password"; then
            echo "WARNING: Possible hardcoded password found"
            exit 1
          fi
          echo "No hardcoded secrets detected."

  # ─────────────────────────────────────────────────────────────
  # Docker: Build Verification
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: natiqa-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: natiqa-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://backend:8000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
