user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Security: إخفاء إصدار nginx ─────────────────────────────────
    server_tokens off;

    # ── Security Headers (عالمية) ────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.railway.app https://natiqa.ai https://www.natiqa.ai; frame-ancestors 'none';" always;

    # ── Rate Limiting Zones ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm font/woff2;

    # ── Connection Limits ─────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Log Format ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Upstream ─────────────────────────────────────────────────────
    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 16; }

    # ── CORS Origins Whitelist (map) ──────────────────────────────────
    map $http_origin $cors_origin {
        default                                                    "";
        "http://localhost:3000"                                    "$http_origin";
        "https://frontend-production-043cd.up.railway.app"        "$http_origin";
        "https://natiqa.ai"                                        "$http_origin";
        "https://www.natiqa.ai"                                    "$http_origin";
    }

    server {
        listen 80;
        server_name _;

        # Body size limits
        client_max_body_size 55M;
        client_body_buffer_size 128k;

        # Connection limit per IP
        limit_conn conn_limit 50;

        # ── Block common exploit paths ─────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl)$ {
            return 404;
        }
        location ~* /\.(git|env|htaccess|htpasswd) {
            return 404;
        }

        # ── Frontend ──────────────────────────────────────────────
        location / {
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Request-ID' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 600;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        'upgrade';
            proxy_http_version 1.1;
            proxy_cache_bypass $http_upgrade;
            proxy_next_upstream error timeout;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # ── API ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # CORS: استخدام map بدلاً من wildcard
            add_header 'Access-Control-Allow-Origin'      "$cors_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Request-ID' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 600;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    180s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;

            # ── Login: حد أكثر صرامة ──────────────────────────────
            location /api/auth/login {
                limit_req zone=login burst=3 nodelay;
                add_header 'Access-Control-Allow-Origin'      "$cors_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods'     'POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept' always;
                proxy_pass http://backend;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # ── Register rate limit ───────────────────────────────
            location /api/auth/register {
                limit_req zone=register burst=2 nodelay;
                proxy_pass http://backend;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # ── Upload: حجم أكبر ووقت أطول ───────────────────────
            location ~ /api/projects/.*/documents$ {
                limit_req zone=upload burst=5 nodelay;
                client_max_body_size 55M;
                proxy_pass http://backend;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
            }
        }
    }
}
